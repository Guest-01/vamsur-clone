name: Deploy to GitHub Pages

# 기본 브랜치에 push될 때 자동 실행 + Actions 탭에서 수동 실행도 가능
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 최소 권한 (OIDC 토큰 포함)
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 겹치지 않도록 직렬화 (진행 중인 배포는 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) 빌드: 소스를 받아 dist/ 를 만들고 Pages 아티팩트로 업로드
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build # tsc --noEmit && vite build → dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 2) 배포: 업로드된 아티팩트를 GitHub Pages에 게시
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
