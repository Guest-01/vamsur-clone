<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Crypt of the Eternal Night — 뱀파이어 서바이버 데모</title>
    <style>
      :root {
        --bg: #07070c;
        --bg2: #11111c;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(circle at 50% 30%, var(--bg2), var(--bg) 70%);
        overflow: hidden;
        color: #e8e0d0;
        font-family: "Press Start 2P", "Cinzel", monospace;
        -webkit-font-smoothing: none;
        image-rendering: pixelated;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game canvas {
        image-rendering: pixelated;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), 0 0 2px rgba(180, 150, 80, 0.4);
        border-radius: 4px;
      }
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        color: #b89b5e;
        font-family: monospace;
        letter-spacing: 2px;
        z-index: 10;
      }
      #boot-loader .spin {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(184, 155, 94, 0.25);
        border-top-color: #b89b5e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
    </div>
    <div id="boot-loader"><div class="spin"></div><div>LOADING…</div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
