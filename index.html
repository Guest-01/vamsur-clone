<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>영원한 밤의 묘지 — 뱀파이어 서바이버 데모</title>
    <style>
      :root {
        --bg: #07070c;
        --bg2: #11111c;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 30%, var(--bg2), var(--bg) 70%);
        overflow: hidden;
        color: #e8e0d0;
        font-family: "Press Start 2P", "Cinzel", monospace;
        -webkit-font-smoothing: none;
        image-rendering: pixelated;
        /* touch hardening for mobile */
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      #game canvas {
        image-rendering: pixelated;
        touch-action: none;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
      }
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        color: #b89b5e;
        font-family: monospace;
        letter-spacing: 2px;
        z-index: 10;
      }
      #boot-loader .spin {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(184, 155, 94, 0.25);
        border-top-color: #b89b5e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Landscape-first: ask the player to rotate when held in portrait. */
      #rotate { display: none; }
      @media (orientation: portrait) {
        #rotate {
          position: fixed;
          inset: 0;
          z-index: 100;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 16px;
          padding: 24px;
          text-align: center;
          background: var(--bg);
          color: #c9a24b;
          font-family: "Cinzel", serif;
        }
        #rotate .icon { font-size: 16vw; animation: rotnudge 1.6s ease-in-out infinite; }
        #rotate .ko { font-size: 6.5vw; color: #e8e0d0; }
        #rotate .en { font-size: 3.4vw; color: #9a8f78; }
        @keyframes rotnudge {
          0%, 100% { transform: rotate(-12deg); }
          50% { transform: rotate(78deg); }
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
    </div>
    <div id="boot-loader"><div class="spin"></div><div>LOADING…</div></div>
    <div id="rotate">
      <div class="icon">▭</div>
      <div class="ko">기기를 가로로 돌려주세요</div>
      <div class="en">Please rotate your device to landscape</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
